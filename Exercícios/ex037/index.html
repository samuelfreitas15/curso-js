<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base numérica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Conversão de Base Numérica</h1>
    </header>
    <main>
        <div>
            <label for="tnum">Digite um número: </label>
            <input type="number" name="tnum" id="tnum">
        </div>
        <div>
            <input type="radio" name="tipoBase" id="rbBin" checked>
            <label for="rbBin">Binário</label>
            <input type="radio" name="tipoBase" id="rbOct">
            <label for="rbOct">Octal</label>
            <input type="radio" name="tipoBase" id="rbHex">
            <label for="rbHex">Hexadecimal</label>
        </div>
        <div>
            <input type="button" value="Converter" onclick="converter()">
            <p id="res"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
