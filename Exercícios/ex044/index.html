<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculadora de preço</h1>
    </header>
    <main>
        <form action="">
            <div>
                <label for="preco">Qual o preço: R$</label>
                <input type="number" name="preco" id="preco">
                <input type="button" value="Calcular" onclick="calcular()">
            </div>
            <select name="opcoes" id="opcoes">
                <option value="0" selected>À vista dinheiro/PIX</option>
                <option value="1">À vista cartão</option>
                <option value="2">Cartão 2x</option>
                <option value="3">Cartão 3x</option>
            </select>
        </form>
        <div id="res">
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
