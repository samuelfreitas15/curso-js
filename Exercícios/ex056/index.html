<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Análise de pessoas</h1>
    </header>
    <main>
        <form action="#">
            <p id="pessoa">Dados da 1ª pessoa:</p>
            <div>
                <label for="nome">Digite o nome:</label>
                <input type="text" name="nome" id="nome">
            </div>
            <div>
                <label for="idade">Digite a idade:</label>
                <input type="number" name="idade" id="idade">
            </div>
            <div>
                <p>Escolha o sexo:</p>
                <input type="radio" name="sexo" id="mas" checked>
                <label for="mas">Masculino</label>
                <input type="radio" name="sexo" id="fem">
                <label for="fem">Feminino</label>
            </div>
            <div>
                <input type="button" value="Adicionar" onclick="adicionar()" id="btAdd">
                <p id="res"></p>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
