<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par ou Ímpar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Par ou Ímpar</h1>
    </header>
    <main>
        <div>
            <label for="num">Digite um valor</label>
            <input type="number" name="num" id="num">
        </div>
        <div>
            <input type="radio" name="poi" id="par">
            <label for="par">Par</label>
            <input type="radio" name="poi" id="impar">
            <label for="impar">Ímpar</label>
        </div>
        <div>
            <input type="button" value="Jogar" onclick="jogar()">
            <p id="res"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
