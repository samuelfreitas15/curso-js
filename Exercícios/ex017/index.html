<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculadora de hipotenusa</h1>
    </header>
    <main>
        <div>
            <label for="tcatop">Digite o cateto oposto</label>
            <input type="number" name="tcatop" id="tcatop">
        </div>
        <div>
            <label for="tcatad">Digite o cateto adjacente</label>
            <input type="number" name="tcatad" id="tcatad">
        </div>
        <div>
            <input type="button" value="Calcular" onclick="calcular()">
        </div>
        <div id="res">
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
