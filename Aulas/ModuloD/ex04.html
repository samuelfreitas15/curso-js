<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <label for="txtvel">Velocidade do carro: </label>
    <input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="multa"></div>

    <script>
        function calcular() {
            var txtv = document.getElementById('txtvel')
            var multado = document.getElementById('multa')
            var velocidade = Number(txtv.value)
            if (velocidade > 60) {
                multado.innerHTML = '<p><strong>Multado</strong></p>'
            }else {
                multado.innerHTML = '<p>Siga sua viagem</p>'
            }
        }
    </script>
</body>
</html>
