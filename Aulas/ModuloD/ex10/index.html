<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <main>
        <div id="ano">
            <label for="txtano">Ano de Nascimento:</label>
            <input type="number" name="txtano" id="txtano">
        </div>
        <div id="sexo">
            <label for="">Sexo:</label>
            <input type="radio" name="rbsexo" id="masc" checked> <label for="masc">Masculino</label>
            <input type="radio" name="rbsexo" id="fem"><label for="fem">Feminino</label>
        </div>
        <div id="enviar">
            <input type="submit" value="Verificar" onclick="verificar()">
        </div>
        <div id="res">
            Preencha os dados para ver o resultado
            
        </div>
    </main>

    <script src="script.js">

    </script>
</body>
</html>
