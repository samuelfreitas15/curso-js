<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: normal 20pt;
            background-color: green;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Eventos adicionados no Java Script</h1>
    <div id="area">
        Interaja...
    </div>

    <script>
        var a = document.getElementById('area')

        a.addEventListener('click', clicou)
        a.addEventListener('mouseenter', entrou)
        a.addEventListener('mouseout', saiu)

        function clicou(){
            
            a.innerText = 'clicou!'
        }

        function entrou() {
            a.style.background = 'red'
        }

        function saiu() {
            a.style.background = 'green'
        }
        
    </script>
</body>
</html>
